server {
    listen 80;
    listen [::]:80;
    server_name skill.sugeflow.com;

    root /var/www/skills-manager-site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /icon.png {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
